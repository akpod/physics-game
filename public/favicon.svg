<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ethiopian Flag Background -->
  <rect width="100" height="33.3" fill="#009A44"/>
  <rect y="33.3" width="100" height="33.4" fill="#FEDD00"/>
  <rect y="66.7" width="100" height="33.3" fill="#EF3340"/>
  
  <!-- Atom core container to ensure visibility -->
  <circle cx="50" cy="50" r="24" fill="#ffffff" opacity="0.9"/>
  
  <!-- Physics Atom Orbits -->
  <ellipse cx="50" cy="50" rx="20" ry="6" fill="none" stroke="#000000" stroke-width="3" transform="rotate(30 50 50)"/>
  <ellipse cx="50" cy="50" rx="20" ry="6" fill="none" stroke="#000000" stroke-width="3" transform="rotate(90 50 50)"/>
  <ellipse cx="50" cy="50" rx="20" ry="6" fill="none" stroke="#000000" stroke-width="3" transform="rotate(150 50 50)"/>
  
  <!-- Atom Nucleus -->
  <circle cx="50" cy="50" r="4" fill="#EF3340"/>
</svg>